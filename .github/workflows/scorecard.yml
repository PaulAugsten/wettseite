name: Scorecard analysis

on:
    push:
        branches: [main]
    schedule:
        # Weekly, independent of pushes, so the score reflects upstream/ecosystem changes too.
        - cron: "20 7 * * 1"

permissions: read-all

jobs:
    analysis:
        runs-on: ubuntu-latest
        permissions:
            security-events: write # to upload SARIF results to the code-scanning dashboard
            id-token: write # to publish results and get a badge via OpenSSF's API
        steps:
            - uses: actions/checkout@v7
              with:
                  persist-credentials: false

            - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
              with:
                  results_file: results.sarif
                  results_format: sarif
                  publish_results: true

            # Results are also kept as a workflow artifact for local inspection.
            - uses: actions/upload-artifact@v7
              with:
                  name: SARIF file
                  path: results.sarif
                  retention-days: 5

            - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
              with:
                  sarif_file: results.sarif
