name: Deploy production

# Runs after CI succeeds on main. The `production` GitHub Environment (required reviewers,
# wait timer, scoped secrets) gates the job itself — see docs/adr or repo Settings > Environments.
# Vercel's own auto-deploy for main is disabled via vercel.json (git.deploymentEnabled.main:
# false) so this is the only path a production deploy can take; preview deploys for other
# branches/PRs still happen automatically through Vercel's Git integration.
#
# This deploys via a *remote* build (no --prebuilt, no local `vercel build`), deliberately:
# several production env vars (e.g. the Supabase service-role key) are marked "Sensitive" in
# Vercel, which means their values can never be read back by `vercel pull`/`env pull` — only
# by a build running inside Vercel's own container. A local prebuilt flow would bake in empty
# strings for those vars every time.
on:
    workflow_run:
        workflows: [CI]
        types: [completed]
        branches: [main]

permissions:
    contents: read

jobs:
    deploy:
        if: github.event.workflow_run.conclusion == 'success'
        runs-on: ubuntu-latest
        environment: production
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.workflow_run.head_sha }}
            - run: npx vercel@54.17.1 deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
              env:
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
