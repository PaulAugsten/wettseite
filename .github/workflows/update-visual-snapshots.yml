name: Update visual snapshots

# Visual baselines (e2e/visual.spec.ts-snapshots/) must be captured against a real
# deployed preview, not a local build: Vercel's edge rendering (fonts, image
# optimization) differs enough from `next start` that even static pages mismatch.
# Run this manually from the Actions tab with the PR's preview URL (Vercel's bot
# comments it on the PR) whenever a UI change makes the baselines stale.
on:
    workflow_dispatch:
        inputs:
            preview_url:
                description: Preview deployment URL (from the Vercel bot's PR comment)
                required: true
                type: string

permissions:
    contents: write

jobs:
    update-snapshots:
        runs-on: ubuntu-latest
        container:
            image: mcr.microsoft.com/playwright:v1.61.1-noble
            options: --ipc=host
        steps:
            - name: Refuse to run on the default branch
              if: github.ref_name == github.event.repository.default_branch
              run: |
                  echo "::error::Dispatch this workflow from the PR branch (the 'Use workflow from' dropdown), not '${GITHUB_REF_NAME}' — pushes to it are blocked by branch protection."
                  exit 1
            - uses: actions/checkout@v7
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v6
              with: { node-version-file: .nvmrc, cache: pnpm }
            - run: pnpm install --frozen-lockfile
            - run: pnpm exec playwright test e2e/visual.spec.ts --update-snapshots
              env:
                  BASE_URL: ${{ inputs.preview_url }}
                  VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
                  HOME: /root
            - name: Commit updated snapshots
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add e2e/visual.spec.ts-snapshots
                  git diff --cached --quiet || git commit -m "test: update visual regression snapshots"
                  git push
