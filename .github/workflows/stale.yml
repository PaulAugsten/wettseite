name: Stale

on:
    schedule:
        - cron: "0 6 * * *"

permissions:
    issues: write
    pull-requests: write

jobs:
    stale:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/stale@v10
              with:
                  days-before-stale: 60
                  days-before-close: 14
                  stale-issue-label: stale
                  stale-pr-label: stale
                  exempt-issue-labels: pinned,security
                  exempt-pr-labels: pinned,security
                  stale-issue-message: >
                      This issue has had no activity for 60 days and will be closed in 14 days
                      if nothing changes. Comment or remove the `stale` label to keep it open.
                  stale-pr-message: >
                      This PR has had no activity for 60 days and will be closed in 14 days
                      if nothing changes. Comment, push a commit, or remove the `stale` label
                      to keep it open.
