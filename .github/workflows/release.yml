name: Release

on:
    workflow_run:
        workflows: [CI]
        types: [completed]
        branches: [main]

permissions:
    contents: read

jobs:
    release:
        if: github.event.workflow_run.conclusion == 'success'
        runs-on: ubuntu-latest
        permissions:
            contents: write
            issues: write
            pull-requests: write
        steps:
            - uses: actions/checkout@v7
              with:
                  ref: ${{ github.event.workflow_run.head_sha }}
                  fetch-depth: 0
                  # Deploy key with write access, added to the ruleset's bypass list, so the
                  # release commit can push straight to main despite the "require PR" rule.
                  # Scoped to just this key, unlike an admin-account bypass.
                  ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with: { node-version-file: .nvmrc, cache: pnpm }
            - run: pnpm install --frozen-lockfile
            - run: pnpm exec semantic-release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
