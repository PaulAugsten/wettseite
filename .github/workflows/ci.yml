name: CI

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]

# Cancel superseded runs on the same branch/PR to save minutes.
concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with: { node-version-file: .nvmrc, cache: pnpm }
            - run: pnpm install --frozen-lockfile
            - run: pnpm lint
            - run: pnpm lint:next

    typecheck:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with: { node-version-file: .nvmrc, cache: pnpm }
            - run: pnpm install --frozen-lockfile
            - run: pnpm typecheck

    unit:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with: { node-version-file: .nvmrc, cache: pnpm }
            - run: pnpm install --frozen-lockfile
            - run: pnpm test:coverage
            - name: Upload coverage
              uses: codecov/codecov-action@v5
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  fail_ci_if_error: true

    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with: { node-version-file: .nvmrc, cache: pnpm }
            - run: pnpm install --frozen-lockfile
            # Sanity build to catch what Vercel would catch, plus enables bundle analysis (§6).
            - run: pnpm build
              env:
                  NEXT_TELEMETRY_DISABLED: '1'
                  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
                  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
                  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    # The Deno edge function is excluded from tsconfig.json (different runtime, different
    # ambient globals) so tsc never sees it. Type-check it with Deno's own checker instead,
    # and only when it actually changed.
    deno-check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      deno:
                          - 'supabase/functions/**'
            - if: steps.filter.outputs.deno == 'true'
              uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x
            - if: steps.filter.outputs.deno == 'true'
              run: deno check supabase/functions/get-matches/index.ts
