name: CI

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]

# Cancel superseded runs on the same branch/PR to save minutes.
concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with: { node-version-file: .nvmrc, cache: pnpm }
            - run: pnpm install --frozen-lockfile
            - run: pnpm lint
            - run: pnpm lint:next

    typecheck:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with: { node-version-file: .nvmrc, cache: pnpm }
            - run: pnpm install --frozen-lockfile
            - run: pnpm typecheck

    unit:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with: { node-version-file: .nvmrc, cache: pnpm }
            - run: pnpm install --frozen-lockfile
            - run: pnpm test:coverage
            - name: Upload coverage
              uses: codecov/codecov-action@v5
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  fail_ci_if_error: true

    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with: { node-version-file: .nvmrc, cache: pnpm }
            - run: pnpm install --frozen-lockfile
            # Sanity build to catch what Vercel would catch, plus enables bundle analysis (§6).
            - run: pnpm build
              env:
                  NEXT_TELEMETRY_DISABLED: '1'
                  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
                  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
                  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
                  # Source map upload + release creation no-ops until these secrets exist.
                  # The build that actually ships runs on Vercel, so set the same vars
                  # there too once a Sentry project exists.
                  SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
                  SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
                  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

    # Compares this PR's build against main's build and comments the size diff.
    # PR-only: there's no "base" build to diff against on a plain push to main.
    bundle-size:
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
        steps:
            - uses: actions/checkout@v4
            - uses: andresz1/size-limit-action@f7a56ece616db5bddde81de219695c920a8ae137 # v1
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  package_manager: pnpm
              env:
                  NEXT_TELEMETRY_DISABLED: '1'
                  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
                  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
                  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    # The Deno edge function is excluded from tsconfig.json (different runtime, different
    # ambient globals) so tsc never sees it. Type-check it with Deno's own checker instead,
    # and only when it actually changed.
    deno-check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      deno:
                          - 'supabase/functions/**'
            - if: steps.filter.outputs.deno == 'true'
              uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x
            - if: steps.filter.outputs.deno == 'true'
              run: deno check supabase/functions/get-matches/index.ts
