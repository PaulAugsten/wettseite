name: CI

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]

# Cancel superseded runs on the same branch/PR to save minutes.
concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with: { node-version-file: .nvmrc, cache: pnpm }
            - run: pnpm install --frozen-lockfile
            - run: pnpm lint
            - run: pnpm lint:next

    typecheck:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with: { node-version-file: .nvmrc, cache: pnpm }
            - run: pnpm install --frozen-lockfile
            - run: pnpm typecheck

    knip:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with: { node-version-file: .nvmrc, cache: pnpm }
            - run: pnpm install --frozen-lockfile
            - run: pnpm knip

    unit:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with: { node-version-file: .nvmrc, cache: pnpm }
            - run: pnpm install --frozen-lockfile
            - run: pnpm test:coverage
            - name: Upload coverage
              uses: codecov/codecov-action@v5
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  fail_ci_if_error: true

    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with: { node-version-file: .nvmrc, cache: pnpm }
            - run: pnpm install --frozen-lockfile
            # Sanity build to catch what Vercel would catch, plus enables bundle analysis (§6).
            - run: pnpm build
              env:
                  NEXT_TELEMETRY_DISABLED: '1'
                  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
                  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
                  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
                  # Source map upload + release creation no-ops until these secrets exist.
                  # The build that actually ships runs on Vercel, so set the same vars
                  # there too once a Sentry project exists.
                  SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
                  SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
                  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

    # Flat budget check against this build's own output (see .size-limit.json).
    # Not a diff against main's build: that required rebuilding main on every
    # PR, which broke whenever main's toolchain drifted from the PR branch's.
    bundle-size:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with: { node-version-file: .nvmrc, cache: pnpm }
            - run: pnpm install --frozen-lockfile
            - run: pnpm build
              env:
                  NEXT_TELEMETRY_DISABLED: '1'
                  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
                  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
                  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            - run: pnpm size

    # The Deno edge function is excluded from tsconfig.json (different runtime, different
    # ambient globals) so tsc never sees it. Type-check it with Deno's own checker instead,
    # and only when it actually changed.
    deno-check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      deno:
                          - 'supabase/functions/**'
            - if: steps.filter.outputs.deno == 'true'
              uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x
            - if: steps.filter.outputs.deno == 'true'
              working-directory: supabase/functions/get-matches
              run: deno install
            - if: steps.filter.outputs.deno == 'true'
              working-directory: supabase/functions/get-matches
              run: deno check index.ts
