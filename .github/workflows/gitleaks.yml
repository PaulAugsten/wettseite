name: Gitleaks

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    schedule:
        # Catches secrets already in history (e.g. committed before the pre-commit hook existed).
        - cron: "10 4 * * *"

permissions:
    contents: read

jobs:
    scan:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write # to comment findings on the PR
        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
